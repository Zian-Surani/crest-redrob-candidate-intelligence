ai_usage_summary: |
  Claude and Codex were used for architecture discussion, implementation, and code review.
  Local Qwen models are restricted to optional interview-question generation and reasoning
  audits. The competition ranking path makes no LLM or network calls.

methodology_summary: |
  CREST streams the 100,000-candidate JSONL through an integrity gate, a hybrid
  career/skill relevance scorer, experience and location fit, and a behavioral
  availability adjustment. Offline MiniLM candidate embeddings add a bounded semantic
  retrieval signal; all human-facing reasoning remains derived from explicit profile
  evidence. High-risk temporal contradictions and unsupported skill claims are excluded
  before deterministic top-K selection. Each result includes score components, honest
  concerns, projected cost-to-hire, and candidate-specific interview questions. The
  ranking step is CPU-only, network-free, and produces the required top-100 CSV.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
